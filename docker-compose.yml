services:
  manzufei-ocr:
    image: manzufei-ocr:0.1.0
    container_name: manzufei-ocr
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./models:/app/models
      - ./app/config/local.yaml:/app/app/config/local.yaml:ro
    environment:
      MANZUFEI_BACKEND_DEBUG: "0"
      MANZUFEI_PUBLIC_BASE_URL: "${MANZUFEI_PUBLIC_BASE_URL:-}"
    gpus: all
