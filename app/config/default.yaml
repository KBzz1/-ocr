# app/config/default.yaml
# 安全默认/占位配置，不包含真实部署参数、本机路径、密钥或患者数据。

app:
  version: "0.1.0"

server:
  bind_host: "0.0.0.0"
  port: 8081

paths:
  data_dir: "./data"
  log_dir: "./logs"
  export_dir: "./exports"
  model_dir: "./models"
  static_dir: "./app/frontend/dist"

sessions:
  capture_session_ttl_minutes: 30

upload:
  max_file_size_mb: 10
  min_quad_area_ratio: 0.01

algorithms:
  enable_local_ocr: false
  local_ocr_python_executable: "python"
  local_ocr_script_path: "./app/backend/services/algorithm_ports/paddleocr_vl_batch_runner.py"
  local_ocr_timeout_seconds: 1800
  local_ocr_device:
  local_ocr_max_new_tokens:
  local_ocr_max_pixels:
  enable_copd_extractor: false
  llm_model_path: "./models/llm/qwen2.5-7b-instruct-gguf/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf"
