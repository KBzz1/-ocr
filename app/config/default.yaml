# app/config/default.yaml
# 安全默认/占位配置，不包含真实部署参数、本机路径、密钥或患者数据。

app:
  version: "0.1.0"

server:
  bind_host: "0.0.0.0"
  port: 8081

paths:
  data_dir: "./data"
  log_dir: "./logs"
  export_dir: "./exports"
  model_dir: "./models"

sessions:
  capture_session_ttl_minutes: 30

upload:
  max_file_size_mb: 10
  min_quad_area_ratio: 0.01
